
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>적립식 복리 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-size: 28px; margin-bottom: 30px; color: var(--primary); }
        
        .input-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; padding: 20px; background: #f1f5f9; border-radius: 16px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #64748b; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { grid-column: 1 / -1; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; text-align: center; }
        .card p { margin: 0; font-size: 14px; color: #64748b; }
        .card h3 { margin: 10px 0 0; font-size: 20px; color: var(--text); }
        .card.highlight h3 { color: var(--primary); }

        .chart-wrapper { position: relative; height: 400px; margin-bottom: 40px; }
        
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 15px; font-size: 14px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; text-align: right; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
        .text-center { text-align: center; }
        .profit { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 적립식 복리 마법 계산기</h2>
    
    <div class="input-section">
        <div class="input-group">
            <label>초기 투자금 (원)</label>
            <input type="number" id="principal" value="10000000">
        </div>
        <div class="input-group">
            <label>매월 추가 적립 (원)</label>
            <input type="number" id="monthly" value="500000">
        </div>
        <div class="input-group">
            <label>연 수익률 (%)</label>
            <input type="number" id="rate" step="0.1" value="10">
        </div>
        <div class="input-group">
            <label>투자 기간 (년)</label>
            <input type="number" id="years" value="20">
        </div>
        <button onclick="calculate()">시뮬레이션 돌리기</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <p>총 투자 원금</p>
            <h3 id="statTotalInvested">0원</h3>
        </div>
        <div class="card highlight">
            <p>최종 평가 금액</p>
            <h3 id="statFinalAmount">0원</h3>
        </div>
        <div class="card">
            <p>총 수익 (수익률)</p>
            <h3 id="statProfit">0원</h3>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="text-center">연차</th>
                    <th>누적 투자금</th>
                    <th>최종 잔액</th>
                    <th>누적 수익금</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let chart = null;

    function calculate() {
        const P = parseFloat(document.getElementById('principal').value) || 0;
        const M = parseFloat(document.getElementById('monthly').value) || 0;
        const annualRate = parseFloat(document.getElementById('rate').value) / 100 || 0;
        const years = parseInt(document.getElementById('years').value) || 0;
        
        const monthlyRate = annualRate / 12;
        const totalMonths = years * 12;

        let labels = [];
        let investedData = []; // 원금 추이
        let totalData = [];    // 원리금 추이
        let tableHTML = "";

        let currentBalance = P;
        let cumulativeInvested = P;

        // 0년차 (시작)
        labels.push("시작");
        investedData.push(P);
        totalData.push(P);
        tableHTML += `<tr><td class="text-center">시작</td><td>${P.toLocaleString()}원</td><td>${P.toLocaleString()}원</td><td class="profit">0원</td></tr>`;

        for (let y = 1; y <= years; y++) {
            // 1년(12개월) 동안의 변화 계산
            for (let m = 1; m <= 12; m++) {
                currentBalance = (currentBalance + M) * (1 + monthlyRate);
                cumulativeInvested += M;
            }

            labels.push(y + "년");
            investedData.push(cumulativeInvested);
            totalData.push(Math.floor(currentBalance));

            tableHTML += `
                <tr>
                    <td class="text-center">${y}년차</td>
                    <td>${cumulativeInvested.toLocaleString()}원</td>
                    <td>${Math.floor(currentBalance).toLocaleString()}원</td>
                    <td class="profit">+${Math.floor(currentBalance - cumulativeInvested).toLocaleString()}원</td>
                </tr>
            `;
        }

        // 대시보드 업데이트
        const finalBalance = totalData[totalData.length - 1];
        const profit = finalBalance - cumulativeInvested;
        const profitRate = ((profit / cumulativeInvested) * 100).toFixed(1);

        document.getElementById('statTotalInvested').innerText = cumulativeInvested.toLocaleString() + "원";
        document.getElementById('statFinalAmount').innerText = finalBalance.toLocaleString() + "원";
        document.getElementById('statProfit').innerText = `${profit.toLocaleString()}원 (${profitRate}%)`;
        document.getElementById('tableBody').innerHTML = tableHTML;

        renderChart(labels, investedData, totalData);
    }

    function renderChart(labels, invested, total) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '최종 잔액 (원금+이자)',
                        data: total,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '누적 투자 원금',
                        data: invested,
                        borderColor: '#94a3b8',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (context) => context.dataset.label + ': ' + context.raw.toLocaleString() + '원'
                        }
                    }
                },
                scales: {
                    y: {
                        ticks: { callback: (val) => (val / 100000000).toFixed(1) + '억' }
                    }
                }
            }
        });
    }

    window.onload = calculate;
</script>
</body>
</html>
